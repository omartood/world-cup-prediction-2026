<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spain World Cup champions celebration</title>
  <desc id="desc">Animated README banner celebrating Spain winning the World Cup after the prediction model selected Spain.</desc>
  <defs>
    <linearGradient id="stadium" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21020A"/>
      <stop offset="0.42" stop-color="#7F0617"/>
      <stop offset="1" stop-color="#F2B705"/>
    </linearGradient>
    <linearGradient id="gold" x1="390" y1="52" x2="764" y2="363" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2A6"/>
      <stop offset="0.45" stop-color="#FFC400"/>
      <stop offset="1" stop-color="#B76B00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#120006" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 900 66px Arial, Helvetica, sans-serif; letter-spacing: -1px; }
      .sub { font: 600 25px Arial, Helvetica, sans-serif; }
      .meta { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 3px; }
      .tiny { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 2px; }
      .confetti { transform-box: fill-box; transform-origin: center; animation: fall 4.8s linear infinite; }
      .confetti.slow { animation-duration: 6.2s; }
      .confetti.fast { animation-duration: 3.9s; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.4s ease-in-out infinite; }
      .shine { animation: shine 3.2s ease-in-out infinite; }
      .slide { animation: slide 5.5s ease-in-out infinite; }
      @keyframes fall {
        0% { transform: translateY(-80px) rotate(0deg); opacity: 0; }
        12% { opacity: 1; }
        100% { transform: translateY(520px) rotate(260deg); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.045); }
      }
      @keyframes shine {
        0%, 100% { opacity: 0.35; transform: translateX(-80px); }
        50% { opacity: 0.9; transform: translateX(80px); }
      }
      @keyframes slide {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(26px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .confetti, .pulse, .shine, .slide { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#stadium)"/>
  <rect y="70" width="1200" height="122" fill="#C60B1E" opacity="0.88"/>
  <rect y="192" width="1200" height="118" fill="#FFC400" opacity="0.9"/>
  <rect y="310" width="1200" height="110" fill="#C60B1E" opacity="0.8"/>

  <g opacity="0.22" class="slide">
    <path d="M-40 345C112 260 230 268 375 315C520 362 644 380 812 308C980 236 1090 242 1240 323" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
    <path d="M-60 92C82 153 230 142 383 102C536 62 701 58 856 122C1011 186 1109 167 1248 95" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g class="confetti fast"><rect x="76" y="-20" width="14" height="28" rx="3" fill="#FFC400"/></g>
  <g class="confetti slow"><rect x="172" y="-110" width="18" height="18" rx="4" fill="#FFFFFF"/></g>
  <g class="confetti"><circle cx="274" cy="-45" r="9" fill="#1D6F42"/></g>
  <g class="confetti fast"><rect x="386" y="-145" width="12" height="32" rx="3" fill="#C60B1E"/></g>
  <g class="confetti slow"><circle cx="492" cy="-70" r="8" fill="#FFC400"/></g>
  <g class="confetti"><rect x="610" y="-125" width="20" height="10" rx="3" fill="#FFFFFF"/></g>
  <g class="confetti fast"><rect x="724" y="-52" width="15" height="24" rx="3" fill="#101828"/></g>
  <g class="confetti slow"><circle cx="846" cy="-135" r="10" fill="#C60B1E"/></g>
  <g class="confetti"><rect x="972" y="-85" width="13" height="30" rx="3" fill="#FFC400"/></g>
  <g class="confetti fast"><circle cx="1108" cy="-45" r="8" fill="#FFFFFF"/></g>

  <g filter="url(#softShadow)">
    <rect x="64" y="58" width="1072" height="304" rx="24" fill="#0B0F1A" opacity="0.44"/>
    <rect x="82" y="76" width="1036" height="268" rx="18" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="2"/>
  </g>

  <g transform="translate(92 102)">
    <rect width="242" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.24"/>
    <circle cx="27" cy="22" r="9" fill="#FFC400" class="pulse"/>
    <text x="48" y="29" class="meta" fill="#FFF7CC">PREDICTION WON</text>
  </g>

  <text x="92" y="207" class="title" fill="#FFFFFF">Hambalyo Spain</text>
  <text x="94" y="250" class="sub" fill="#FFF1B8">Model-ku wuxuu saadaaliyey guusha. Koobkiina waa la qaaday.</text>
  <text x="94" y="295" class="sub" fill="#FFFFFF" opacity="0.86">Mahadsanidiin fans-ka nala socday.</text>

  <g transform="translate(828 84)" class="pulse" filter="url(#softShadow)">
    <path d="M98 27h128v72c0 68-37 121-91 132v31h46v36H43v-36h45v-31C35 220-2 167-2 99V27h100Z" fill="url(#gold)"/>
    <path d="M21 57H-34v41c0 47 29 78 73 85" stroke="#FFE680" stroke-width="24" stroke-linecap="round"/>
    <path d="M203 57h55v41c0 47-29 78-73 85" stroke="#FFE680" stroke-width="24" stroke-linecap="round"/>
    <rect x="65" y="298" width="94" height="24" rx="8" fill="#6B3400"/>
    <path d="M97 88l15-31 15 31 34 5-25 24 6 34-30-16-30 16 6-34-25-24 34-5Z" fill="#7F0617"/>
  </g>

  <g class="shine">
    <path d="M286 72L680 344" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity="0.16"/>
  </g>

  <text x="866" y="358" class="tiny" fill="#FFF7CC">VAMOS SPAIN · CHAMPIONS</text>
</svg>
